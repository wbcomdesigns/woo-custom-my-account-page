name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  php-lint:
    name: PHP Lint (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: none

      - name: Check PHP syntax
        run: find . -name "*.php" -not -path "./vendor/*" -not -path "./node_modules/*" | xargs php -l

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Install PHPStan and WordPress stubs
        run: composer require --dev szepeviktor/phpstan-wordpress phpstan/phpstan --no-interaction 2>/dev/null || true

      - name: Create phpstan.neon if not exists
        run: |
          if [ ! -f phpstan.neon ] && [ ! -f phpstan.neon.dist ]; then
            cat > phpstan.neon << 'NEON'
          includes:
            - vendor/szepeviktor/phpstan-wordpress/extension.neon
          parameters:
            level: 5
            paths:
              - .
            excludePaths:
              - vendor
              - node_modules
              - tests
          NEON
          fi

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=512M 2>/dev/null || echo "PHPStan completed with warnings"

  wpcs:
    name: WordPress Coding Standards
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer, cs2pr

      - name: Install WPCS
        run: composer require --dev wp-coding-standards/wpcs:"^3.0" --no-interaction 2>/dev/null || true

      - name: Run PHPCS with WordPress-Extra standard
        run: vendor/bin/phpcs --standard=WordPress-Extra --extensions=php --ignore=vendor,node_modules,build,assets/js/min -n . 2>/dev/null || echo "WPCS completed with warnings"
